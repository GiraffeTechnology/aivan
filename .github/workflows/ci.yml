name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest --tb=short -q
        env:
          AIVAN_LLM_PROVIDER: mock
          OPENCLAW_MOCK_MODE: "true"
          AIVAN_DB_URL: "sqlite:///:memory:"
          AIVAN_REQUIRE_HUMAN_APPROVAL: "true"

      - name: Validate ClawHub plugin metadata
        run: uv run python scripts/validate_clawhub_aivan_plugin.py

      - name: Run plugin smoke test (offline)
        run: uv run python scripts/run_aivan_openclaw_plugin_smoke_test.py --offline
        env:
          AIVAN_LLM_PROVIDER: mock
          OPENCLAW_MOCK_MODE: "true"

      - name: Compile check (Python files)
        run: python -m compileall src/aivan scripts tests -q

      - name: Check for Unicode / line-ending issues
        run: |
          python - << 'EOF'
          import os, re, sys
          BIDI = re.compile(r'[​-‏‪-‮⁠-⁩﻿]')
          bad = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', '.venv', '__pycache__', 'node_modules', 'dist')]
              for f in files:
                  if not any(f.endswith(e) for e in ('.py', '.ts', '.md', '.json', '.yml', '.yaml', '.sh')):
                      continue
                  path = os.path.join(root, f)
                  raw = open(path, 'rb').read()
                  issues = []
                  if b'\r\n' in raw:
                      issues.append('CRLF')
                  if raw.startswith(b'\xef\xbb\xbf'):
                      issues.append('BOM')
                  if BIDI.search(raw.decode('utf-8', errors='replace')):
                      issues.append('BIDI')
                  if issues:
                      bad.append(f"{','.join(issues)}: {path}")
          if bad:
              print('\n'.join(bad))
              sys.exit(1)
          print('No encoding issues found.')
          EOF

  typescript:
    name: TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/openclaw-aivan-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: TypeScript syntax check
        run: npx tsc --noEmit
