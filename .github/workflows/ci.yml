name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest --tb=short -q
        env:
          AIVAN_LLM_PROVIDER: mock
          OPENCLAW_MOCK_MODE: "true"
          AIVAN_DB_URL: "sqlite:///:memory:"
          AIVAN_REQUIRE_HUMAN_APPROVAL: "true"

      # The DB-contract scanner is owned by giraffe-db (the single source of
      # truth for record-ID conventions). AIVAN does not vendor a copy; it
      # checks out giraffe-db's scanner and runs it against this repo. Only the
      # scanner file is fetched (sparse, non-cone) and it self-skips by name, so
      # nothing from the giraffe-db checkout is itself scanned.
      # Requires a token with read access to the private giraffe-db repo; the
      # repo-scoped default GITHUB_TOKEN cannot read another repository.
      - name: Check out giraffe-db DB-contract scanner (source of truth)
        uses: actions/checkout@v4
        with:
          repository: GiraffeTechnology/giraffe-db
          path: giraffe-db-contract
          sparse-checkout: scripts/check_unified_data_ids.py
          sparse-checkout-cone-mode: false
          token: ${{ secrets.GIRAFFE_DB_CONTRACT_TOKEN }}

      - name: Unified giraffe-db data-ID contract scan (giraffe-db-owned)
        run: python giraffe-db-contract/scripts/check_unified_data_ids.py --repo .

      - name: Validate ClawHub plugin metadata
        run: uv run python scripts/validate_clawhub_aivan_plugin.py

      - name: Run plugin smoke test (offline)
        run: uv run python scripts/run_aivan_openclaw_plugin_smoke_test.py --offline
        env:
          AIVAN_LLM_PROVIDER: mock
          OPENCLAW_MOCK_MODE: "true"

      - name: Compile check (Python files)
        run: python -m compileall src/aivan scripts tests -q

      - name: Check for Unicode / line-ending issues
        run: |
          python - << 'EOF'
          import os, sys

          def has_bidi(text):
              return any(
                  0x200b <= ord(c) <= 0x200f
                  or 0x202a <= ord(c) <= 0x202e
                  or 0x2060 <= ord(c) <= 0x2069
                  or ord(c) == 0xfeff
                  for c in text
              )

          bad = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', '.venv', '__pycache__', 'node_modules', 'dist')]
              for f in files:
                  if not any(f.endswith(e) for e in ('.py', '.ts', '.md', '.json', '.yml', '.yaml', '.sh')):
                      continue
                  path = os.path.join(root, f)
                  raw = open(path, 'rb').read()
                  issues = []
                  if b'\r\n' in raw:
                      issues.append('CRLF')
                  if raw.startswith(b'\xef\xbb\xbf'):
                      issues.append('BOM')
                  if has_bidi(raw.decode('utf-8', errors='replace')):
                      issues.append('BIDI')
                  if issues:
                      bad.append(f"{','.join(issues)}: {path}")
          if bad:
              print('\n'.join(bad))
              sys.exit(1)
          print('No encoding issues found.')
          EOF

  typescript:
    name: TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/openclaw-aivan-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: TypeScript syntax check
        run: npx tsc --noEmit
